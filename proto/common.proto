syntax = "proto3";

package jlucraft.common.v1;

option java_package = "com.jlucraft.common.v1";
option java_multiple_files = true;

message Empty {}

message Error {
  string code = 1;
  string message = 2;
  map<string, string> details = 3;
}

message PageRequest {
  uint32 limit = 1;
  string cursor = 2;
}

message PageInfo {
  string next_cursor = 1;
  bool has_more = 2;
}

message ResourceRequest {
  uint32 cpu_cores = 1;
  uint64 memory_gb = 2;
  uint64 disk_gb = 3;
}

message PeerIdentity {
  string peer_id = 1;
  string public_key = 2;
  string did = 3;
  string club = 4;
}

message SignedRequest {
  string nonce = 1;
  string signature = 2;
  string challenge_id = 3;
}

message AuthContext {
  PeerIdentity actor = 1;
  SignedRequest signature = 2;
}

message TimeRange {
  string start = 1;
  string end = 2;
}

message StringList {
  repeated string values = 1;
}

message KeyValue {
  string key = 1;
  string value = 2;
}

message BytesEnvelope {
  string content_type = 1;
  bytes payload = 2;
}
