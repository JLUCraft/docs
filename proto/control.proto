  string nonce = 2;
  string issued_at = 3;
  string expires_at = 4;
  uint64 ttl_seconds = 5;
  string cmd_type = 6;
  string payload_hash = 7;
  string human_summary = 8;
  string risk_level = 9;
  string required_role = 10;
}

