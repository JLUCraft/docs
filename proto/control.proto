message SeasonResponse { Season season = 1; }
message LeaderboardResponse { repeated LeaderboardEntry entries = 1; }
message DeviceListResponse { repeated Device devices = 1; }
message DeviceResponse { Device device = 1; }
message ConsensusSnapshotListResponse { repeated string snapshot_keys = 1; }
message ConsensusCredentialResponse { bytes credential = 1; }
message MemberListResponse { repeated Member members = 1; }
message SchedulingConstraintsResponse { SchedulingConstraints constraints = 1; }
message DisputeListResponse { repeated Dispute disputes = 1; }
message DisputeResponse { Dispute dispute = 1; }
message InvitePlayersResponse { uint32 invited_count = 1; bool wake_requested = 2; bool event_emitted = 3; repeated string missing_recipients = 4; }
message MigrationProbeResponse { string status = 1; string target_peer_id = 2; repeated string supported_protocols = 3; uint64 available_disk_mb = 4; double cpu_headroom_pct = 5; uint64 memory_headroom_mb = 6; uint64 estimated_rtt_ms = 7; string reason = 8; string checked_at = 9; }
message DidResolutionResponse { bytes did_document = 1; string error = 2; }
message JoinRequestListResponse { repeated jlucraft.records.v1.JoinRequest requests = 1; }
message JoinStatusResponse { string status = 1; string peer_id = 2; string proposal_id = 3; }
message SubscribeEventsResponse {
  repeated string accepted_topics = 1;
  jlucraft.events.v1.EventEnvelope event = 2;
}

// ReportMetrics: oracle nodes submit their daily per-player metrics.
// Auth: requires ConsensusCredential on the submitting node.
message ReportMetricsRequest {
  string date = 1;                          // ISO-8601 date, e.g. "2026-05-11"
  repeated PlayerMetricEntry entries = 2;   // one entry per player observed today
  string log_merkle_root = 3;              // Merkle root of raw log entries retained for 7 days
  uint64 log_count = 4;                    // number of raw log entries summarised
}

message PlayerMetricEntry {
  string player_id = 1;          // PeerID or Yggdrasil UUID
  double online_minutes = 2;
  uint64 action_count = 3;       // block place/break + movement ticks
  uint64 social_count = 4;       // chat messages + player-interactions
  double build_delta = 5;        // block-level build volume change
}

message OracleMetricsResponse {
  bool accepted = 1;
  string report_hash = 2;        // SHA-256 of the accepted report
  uint32 reports_received = 3;   // total submissions for this date so far
  bool rollup_triggered = 4;     // true when quorum reached and rollup began
}

// StreamInstanceLogs: open a libp2p stream that delivers log lines from a
// running instance. The server sends StreamInstanceLogsResponse frames until
// the stream is closed by either side.
// Auth: requires admin-level VC.
message StreamInstanceLogsRequest {
  string instance_id = 1;
  bool follow = 2;           // if true, keep streaming new lines until stream close
  uint32 tail_lines = 3;     // initial back-log lines to emit before following; 0 = none
  string keyword_filter = 4; // optional substring filter applied server-side
}

message StreamInstanceLogsResponse {
  string instance_id = 1;
  string line = 2;
  string logged_at = 3;      // RFC-3339 timestamp
  bool stream_end = 4;       // true on final frame when follow=false
}
