message GetNodeRequest {}
message GetImageWhitelistRequest {}
message GetClusterHealthRequest {}
message GetNetworkRequest {}
message GetConsensusRequest {}
message ListNodeScoresRequest {}
message GetNodeScoreRequest { string peer_id = 1; }
message ListLeasesRequest {}
message GetLeaseRequest { string instance_id = 1; }
message RefreshLeaseRequest { string instance_id = 1; string holder_peer_id = 2; uint64 ttl_secs = 3; }
message TakeoverLeaseRequest { string instance_id = 1; string new_holder_peer_id = 2; }
message GetSchedulerStatusRequest {}
message ListSchedulerNodesRequest {}
message GetSchedulerNodeRequest { string peer_id = 1; }
message RecommendNodesRequest { uint32 cpu_cores = 1; uint64 memory_mb = 2; uint64 disk_mb = 3; uint32 limit = 4; }
message ListOracleReportsRequest { string date = 1; }
message RollupOracleReportRequest { string date = 1; }
message ListAggregatedOracleReportsRequest {}
message GetAggregatedOracleReportRequest { string date = 1; }
message GetOracleReportHashRequest { string date = 1; }

message ListInstancesRequest { string status = 1; string owner = 2; string club = 3; }
message GetInstanceRequest { string instance_id = 1; }
message CreateInstanceRequest {
  string name = 1;
  string kind = 2;
  string owner = 3;
  string club = 4;
  RuntimeSpec runtime = 5;
  jlucraft.common.v1.ResourceRequest resources = 6;
  bool auto_restart = 7;
  AdmissionPolicy admission = 8;
  string restore_from_snapshot = 9;
}
message StartInstanceRequest { string instance_id = 1; }
message StopInstanceRequest { string instance_id = 1; }
message DeleteInstanceRequest { string instance_id = 1; }
message MigrateInstanceRequest { string instance_id = 1; string target_peer_id = 2; string trigger = 3; }
message AcceptMigrationRequest { string instance_id = 1; string snapshot_key = 2; uint64 raft_index = 3; }
message GetInstanceLogsRequest { string instance_id = 1; uint32 tail_lines = 2; }
message ListInstanceSnapshotsRequest { string instance_id = 1; }
message UpdateAdmissionRequest { string instance_id = 1; AdmissionPolicy admission = 2; }
message CheckAdmissionRequest { string instance_id = 1; string player_peer_id = 2; string player_club = 3; bool has_vc = 4; }
message GetInstanceManifestRequest { string instance_id = 1; }
message GetInstanceLocationRequest { string instance_id = 1; }
message BatchInstanceOperationRequest {
  string operation = 1;
  repeated string instance_ids = 2;
  string target_peer_id = 3;
  string canonical_batch_hash = 4;
}

message RuntimeSpec {
  string image = 1;
  string mc_version = 2;
  map<string, string> env = 3;
  map<string, string> labels = 4;
}

message AdmissionPolicy {
  string mode = 1;
  repeated string allowed_players = 2;
  repeated string allowed_clubs = 3;
}

message Instance {
  string id = 1;
  string name = 2;
  string kind = 3;
  string owner = 4;
  string club = 5;
  string host_peer_id = 6;
  string status = 7;
  string created_at = 8;
  string updated_at = 9;
  uint32 player_count = 10;
  string migration_target = 11;
  RuntimeSpec runtime = 12;
  jlucraft.common.v1.ResourceRequest resources = 13;
  AdmissionPolicy admission = 14;
  string mode = 15;
  uint32 max_players = 16;
  string version = 17;
}

message InstanceOperationResult {
  string instance_id = 1;
  bool success = 2;
  string error = 3;
}

message Lease {
  string instance_id = 1;
  string holder_peer_id = 2;
  string token_hash = 3;
  string expires_at = 4;
  string pending_migration_target = 5;
}

message SchedulerNode {
  string peer_id = 1;
  uint32 cpu_cores = 2;
  uint64 memory_mb = 3;
  uint64 disk_mb = 4;
  uint32 running_instances = 5;
  double score = 6;
  map<string, string> labels = 7;
}

message NodeScore {
  string peer_id = 1;
  double uptime_score = 2;
  double performance_score = 3;
  double governance_score = 4;
  double penalty = 5;
}

message ListProposalsRequest { string status = 1; }
message GetProposalRequest { string proposal_id = 1; }
message CreateProposalRequest { string proposal_type = 1; string title = 2; string description = 3; bytes payload = 4; }
message CreateProposalDraftRequest { string proposal_type = 1; string title = 2; string description = 3; bytes payload = 4; }
message SubmitProposalDraftRequest { string proposal_id = 1; }
message SignProposalRequest { string proposal_id = 1; string public_key = 2; string signature = 3; }
message RejectProposalRequest { string proposal_id = 1; string reason = 2; }
message ExecuteProposalRequest { string proposal_id = 1; }

message Proposal {
  string id = 1;
  string proposal_type = 2;
  string title = 3;
  string description = 4;
  string status = 5;
  string proposer = 6;
  string created_at = 7;
  string updated_at = 8;
  repeated ProposalSignature signatures = 9;
  bytes payload = 10;
}

message ProposalSignature {
  string public_key = 1;
  string signature = 2;
  string signed_at = 3;
}

message ListAuditEntriesRequest { string cmd_type = 1; jlucraft.common.v1.PageRequest page = 2; }
message VerifyAuditChainRequest { string date = 1; }
message FinalizeAuditDayRequest { string date = 1; }
message ListAuditAnomaliesRequest {}

message AuditEntry {
  string id = 1;
  string actor = 2;
  string command = 3;
  string target = 4;
  string payload_hash = 5;
  string prev_hash = 6;
  string outcome = 7;
  string created_at = 8;
}

message AuditAnomaly {
  string id = 1;
  string rule = 2;
  string description = 3;
  string severity = 4;
}

message ListAlertsRequest { string severity = 1; bool include_resolved = 2; }
message GetAlertRequest { string alert_id = 1; }
message CreateAlertRequest { string alert_type = 1; string message = 2; string severity = 3; string target = 4; }
message AcknowledgeAlertRequest { string alert_id = 1; }
message ResolveAlertRequest { string alert_id = 1; }

message Alert {
  string id = 1;
  string alert_type = 2;
  string message = 3;
  string severity = 4;
  string status = 5;
  string target = 6;
  string created_at = 7;
  string resolved_at = 8;
}

message ListTournamentsRequest { string status = 1; }
message GetTournamentRequest { string tournament_id = 1; }
message CreateTournamentRequest {
  string name = 1;
  string game_type = 2;
  string mode = 3;
  TournamentSchedule schedule = 4;
  ScoringRules scoring = 5;
  uint32 min_member_score = 6;
  uint32 max_participants = 7;
}
message UpdateTournamentStatusRequest { string tournament_id = 1; string status = 2; }
message RegisterForTournamentRequest { string tournament_id = 1; string player_id = 2; }
message ListTournamentMatchesRequest { string tournament_id = 1; }
message GenerateTournamentScheduleRequest { string tournament_id = 1; }
message SubmitMatchResultRequest { string match_id = 1; MatchResult result = 2; }
message SpawnMatchRoomRequest { string match_id = 1; }
message ManageTournamentRequest { string tournament_id = 1; string action = 2; }

message Tournament {
  string id = 1;
  string name = 2;
  string game_type = 3;
  string mode = 4;
  TournamentSchedule schedule = 5;
  ScoringRules scoring = 6;
  uint32 min_member_score = 7;
  uint32 max_participants = 8;
  uint32 participant_count = 9;
  string status = 10;
  string created_at = 11;
  string created_by = 12;
}

message TournamentSchedule {
  string registration_open = 1;
  string registration_close = 2;
  repeated MatchSchedule matches = 3;
}

message MatchSchedule {
  uint32 round = 1;
  string datetime = 2;
  string map = 3;
}

message ScoringRules {
  int32 win = 1;
  int32 kill = 2;
  double survive_minute = 3;
  int32 placement_1 = 4;
  int32 placement_2 = 5;
  int32 placement_3 = 6;
}

message Match {
  string id = 1;
  string tournament_id = 2;
  uint32 round = 3;
  repeated string participants = 4;
  string instance_id = 5;
  MatchResult result = 6;
  string status = 7;
  string scheduled_at = 8;
}

message MatchResult {
  repeated PlayerResult rankings = 1;
}

message PlayerResult {
  string player_id = 1;
  double score = 2;
  int32 kills = 3;
  int32 deaths = 4;
  double survive_minutes = 5;
}

message ListTeamsRequest {}
message CreateTeamRequest { string name = 1; repeated string members = 2; }
message Team { string id = 1; string name = 2; repeated string members = 3; int32 total_score = 4; repeated string tournament_ids = 5; }

message ListSeasonsRequest {}
message GetCurrentSeasonRequest {}
message GetSeasonRequest { string season_id = 1; }
message CreateSeasonRequest { string name = 1; string starts_at = 2; string ends_at = 3; }
message UpdateSeasonStatusRequest { string season_id = 1; string status = 2; }
message AddTournamentToSeasonRequest { string season_id = 1; string tournament_id = 2; }
message RemoveTournamentFromSeasonRequest { string season_id = 1; string tournament_id = 2; }
message GetSeasonLeaderboardRequest { string season_id = 1; }
message ArchiveSeasonRequest { string season_id = 1; }
message Season { string id = 1; string name = 2; string status = 3; string starts_at = 4; string ends_at = 5; repeated string tournament_ids = 6; }
message LeaderboardEntry { string player_id = 1; double score = 2; uint32 rank = 3; }

message ListDevicesRequest {}
message GetDeviceRequest { string public_key = 1; }
message RegisterDeviceRequest { string public_key = 1; string owner_peer_id = 2; string device_name = 3; }
message ListDevicesByOwnerRequest { string owner_peer_id = 1; }
message RevokeDeviceRequest { string public_key = 1; string reason = 2; }
